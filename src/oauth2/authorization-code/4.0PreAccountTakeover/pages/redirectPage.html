<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Logged In</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "Segoe UI", sans-serif;
            background: #0f1117;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            padding: 20px;
        }
        .icon { font-size: 4rem; margin-bottom: 20px; }
        .title { font-size: 2rem; font-weight: 800; color: #ff4a4a; margin-bottom: 10px; }
        .sub { font-size: 1rem; color: #888; margin-bottom: 8px; line-height: 1.6; }
        .code-box {
            background: #1a1d27;
            border: 1px solid #ff4a4a33;
            border-radius: 10px;
            padding: 14px 20px;
            margin: 20px auto;
            max-width: 520px;
            width: 100%;
            font-family: monospace;
            font-size: 0.82rem;
            color: #ff8888;
            word-break: break-all;
            text-align: left;
        }
        .code-label { font-size: 0.7rem; color: #555; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
        .notice { font-size: 0.95rem; color: #888; margin-top: 10px; margin-bottom: 12px; }
        .btn {
            background: #ff4a4a;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 13px 28px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover { background: #ff6a6a; }
    </style>
</head>
<body>
    <div class="icon">💀</div>
    <div class="title">You just got hacked.</div>
    <div class="sub">Attacker pre created account and you just confirmed it.</div>

    <div class="code-box">
        <div class="code-label">Authorization code you submitted</div>
        <span id="stolenCode">—</span>
    </div>

    <div class="notice">Did you notice anything wrong?</div>
    <a class="btn" id="showcaseBtn" href="/showcase">👁 Show me what happened</a>

    <script>
        const code = new URLSearchParams(window.location.search).get("code");
        if (code) {
            document.getElementById("stolenCode").textContent = code;
            document.getElementById("showcaseBtn").href = "/showcase?code=" + code + "&attack=csrf";
            const sendRequest = async () => {

                const response  = await fetch(`http://oauthclient:3000/code`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    code,        
                })
            })

            if (response.status != 200) {
                console.log("request failed", response)
            }
            }

            sendRequest()
            
        }
    </script>
</body>
</html>
